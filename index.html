<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Protocoles Chirurgie Viscérale</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #faf8f5;
  --surface: #ffffff;
  --border: #e8e2d9;
  --text: #1a1612;
  --muted: #7a7268;
  --accent: #8b3a3a;
  --accent-light: #f5ebe8;
  --accent2: #3a6b5a;
  --accent2-light: #e8f2ee;
  --yellow: #f0e6c8;
  --yellow-dark: #8a7040;
  --purple: #6b5b8a;
  --purple-light: #f0ecf8;
  --radius: 12px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

header {
  background: var(--accent);
  color: white;
  padding: 1.5rem 2rem;
  display: flex;
  align-items: center;
  gap: 1rem;
}
header h1 { font-family: 'DM Serif Display', serif; font-size: 1.4rem; font-weight: 400; }
header span { font-size: 0.8rem; opacity: 0.75; margin-top: 2px; display: block; }
.header-icon { font-size: 2rem; }

.container { max-width: 960px; margin: 0 auto; padding: 2rem 1.5rem; }

.search-box {
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: var(--radius);
  padding: 1rem 1.25rem;
  display: flex;
  align-items: center;
  gap: 0.75rem;
  margin-bottom: 1.5rem;
  box-shadow: 0 2px 8px rgba(0,0,0,0.06);
}
.search-box input {
  border: none;
  outline: none;
  font-family: 'DM Sans', sans-serif;
  font-size: 1rem;
  flex: 1;
  background: transparent;
  color: var(--text);
}
.search-box input::placeholder { color: var(--muted); }
.search-icon { color: var(--muted); font-size: 1.1rem; }

.tabs {
  display: flex;
  gap: 0.5rem;
  margin-bottom: 1.5rem;
  flex-wrap: wrap;
}
.tab {
  padding: 0.5rem 1rem;
  border-radius: 20px;
  border: 1.5px solid var(--border);
  background: var(--surface);
  font-size: 0.82rem;
  font-weight: 500;
  cursor: pointer;
  color: var(--muted);
  transition: all 0.15s;
}
.tab:hover { border-color: var(--accent); color: var(--accent); }
.tab.active { background: var(--accent); border-color: var(--accent); color: white; }

.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1rem; }

.card {
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: var(--radius);
  padding: 1.25rem;
  cursor: pointer;
  transition: all 0.18s;
  position: relative;
  overflow: hidden;
}
.card:hover { border-color: var(--accent); transform: translateY(-2px); box-shadow: 0 6px 20px rgba(139,58,58,0.1); }
.card-tag {
  display: inline-block;
  font-size: 0.7rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  padding: 2px 8px;
  border-radius: 4px;
  margin-bottom: 0.6rem;
}
.tag-digestive { background: var(--accent-light); color: var(--accent); }
.tag-bariatrique { background: var(--yellow); color: var(--yellow-dark); }
.tag-pansement { background: var(--accent2-light); color: var(--accent2); }
.tag-autre { background: var(--purple-light); color: var(--purple); }

.card h3 { font-size: 1rem; font-weight: 600; margin-bottom: 0.4rem; color: var(--text); }
.card p { font-size: 0.82rem; color: var(--muted); line-height: 1.5; }
.card-arrow { position: absolute; right: 1.25rem; top: 50%; transform: translateY(-50%); color: var(--border); font-size: 1.1rem; }

/* Modal */
.modal-bg {
  display: none;
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.45);
  z-index: 100;
  align-items: flex-start;
  justify-content: center;
  padding: 2rem 1rem;
  overflow-y: auto;
}
.modal-bg.open { display: flex; }
.modal {
  background: var(--surface);
  border-radius: 16px;
  width: 100%;
  max-width: 680px;
  overflow: hidden;
  box-shadow: 0 20px 60px rgba(0,0,0,0.2);
  margin: auto;
}
.modal-header {
  background: var(--accent);
  color: white;
  padding: 1.25rem 1.5rem;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.modal-header h2 { font-family: 'DM Serif Display', serif; font-size: 1.3rem; font-weight: 400; }
.modal-close { background: rgba(255,255,255,0.2); border: none; color: white; width: 32px; height: 32px; border-radius: 50%; font-size: 1rem; cursor: pointer; display: flex; align-items: center; justify-content: center; }
.modal-close:hover { background: rgba(255,255,255,0.35); }
.modal-body { padding: 1.5rem; }

.section-block {
  margin-bottom: 1.25rem;
  border-radius: 10px;
  overflow: hidden;
  border: 1px solid var(--border);
}
.section-block-header {
  padding: 0.65rem 1rem;
  font-size: 0.8rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  display: flex;
  align-items: center;
  gap: 0.5rem;
}
.block-preop { background: var(--accent-light); color: var(--accent); }
.block-realim { background: var(--accent2-light); color: var(--accent2); }
.block-lever { background: var(--yellow); color: var(--yellow-dark); }
.block-surv { background: var(--purple-light); color: var(--purple); }
.block-pst { background: #e8f4fb; color: #1a5a8a; }

.section-block-body { padding: 0.85rem 1rem; font-size: 0.875rem; line-height: 1.7; color: var(--text); }
.section-block-body ul { padding-left: 1.1rem; }
.section-block-body li { margin-bottom: 0.25rem; }
.section-block-body .jour { display: inline-block; font-weight: 600; color: var(--accent); min-width: 32px; }

.alim-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 0.5rem; margin-top: 0.5rem; }
.alim-cell { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 0.5rem; text-align: center; }
.alim-cell .alim-jour { font-size: 0.7rem; font-weight: 600; color: var(--muted); text-transform: uppercase; }
.alim-cell .alim-val { font-size: 0.82rem; font-weight: 500; color: var(--text); margin-top: 2px; }

.add-btn {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  background: var(--accent);
  color: white;
  border: none;
  border-radius: 8px;
  padding: 0.65rem 1.25rem;
  font-family: 'DM Sans', sans-serif;
  font-size: 0.9rem;
  font-weight: 500;
  cursor: pointer;
  margin-bottom: 1.5rem;
  transition: background 0.15s;
}
.add-btn:hover { background: #7a2f2f; }

.add-form { background: var(--surface); border: 1.5px solid var(--accent); border-radius: var(--radius); padding: 1.25rem; margin-bottom: 1.5rem; display: none; }
.add-form.open { display: block; }
.add-form h3 { font-size: 0.95rem; font-weight: 600; margin-bottom: 1rem; color: var(--accent); }
.form-row { margin-bottom: 0.85rem; }
.form-row label { display: block; font-size: 0.8rem; font-weight: 500; color: var(--muted); margin-bottom: 0.3rem; }
.form-row input, .form-row textarea, .form-row select {
  width: 100%;
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 0.55rem 0.75rem;
  font-family: 'DM Sans', sans-serif;
  font-size: 0.875rem;
  color: var(--text);
  background: var(--bg);
  outline: none;
  transition: border 0.15s;
}
.form-row input:focus, .form-row textarea:focus { border-color: var(--accent); }
.form-row textarea { height: 80px; resize: vertical; }
.form-actions { display: flex; gap: 0.75rem; margin-top: 1rem; }
.btn-save { background: var(--accent); color: white; border: none; border-radius: 8px; padding: 0.55rem 1.25rem; font-family: 'DM Sans', sans-serif; font-size: 0.875rem; cursor: pointer; font-weight: 500; }
.btn-cancel { background: var(--bg); color: var(--muted); border: 1px solid var(--border); border-radius: 8px; padding: 0.55rem 1.25rem; font-family: 'DM Sans', sans-serif; font-size: 0.875rem; cursor: pointer; }

.empty { text-align: center; padding: 3rem 1rem; color: var(--muted); }
.empty-icon { font-size: 2.5rem; margin-bottom: 0.75rem; }

.badge-custom { background: var(--purple-light); color: var(--purple); }
</style>
</head>
<body>

<header>
  <div class="header-icon">🏥</div>
  <div>
    <h1>Protocoles Chirurgie Viscérale</h1>
    <span>Clinique François Chénieux · Service US6 Gastro/Viscéral</span>
  </div>
</header>

<div class="container">

  <div class="search-box">
    <span class="search-icon">🔍</span>
    <input type="text" id="searchInput" placeholder="Rechercher une pathologie... ex: colectomie, sleeve, hernie..." oninput="filterCards()">
  </div>

  <div class="tabs">
    <div class="tab active" onclick="filterTab('tous', this)">Toutes</div>
    <div class="tab" onclick="filterTab('digestive', this)">Digestive</div>
    <div class="tab" onclick="filterTab('bariatrique', this)">Bariatrique</div>
    <div class="tab" onclick="filterTab('pansement', this)">Pansements</div>
    <div class="tab" onclick="filterTab('autre', this)">Autre</div>
  </div>

  <button class="add-btn" onclick="toggleAddForm()">
    <span>+</span> Ajouter un protocole
  </button>

  <div class="add-form" id="addForm">
    <h3>Nouveau protocole</h3>
    <div class="form-row">
      <label>Nom de la pathologie *</label>
      <input type="text" id="newName" placeholder="ex: Gastrectomie totale">
    </div>
    <div class="form-row">
      <label>Catégorie</label>
      <select id="newCat">
        <option value="digestive">Chirurgie digestive</option>
        <option value="bariatrique">Bariatrique</option>
        <option value="pansement">Pansement</option>
        <option value="autre">Autre</option>
      </select>
    </div>
    <div class="form-row">
      <label>Résumé court</label>
      <input type="text" id="newSummary" placeholder="ex: Anesthésie générale, RAAC">
    </div>
    <div class="form-row">
      <label>Pré-opératoire (J-1)</label>
      <textarea id="newPreop" placeholder="Préparation veille, régime, jeûne..."></textarea>
    </div>
    <div class="form-row">
      <label>Réalimentation (J0 → J3+)</label>
      <textarea id="newRealim" placeholder="J0: AJ · J1: normal léger · J2: normal..."></textarea>
    </div>
    <div class="form-row">
      <label>1er lever / RAD</label>
      <input type="text" id="newLever" placeholder="ex: J1 avec aide, RAD à J2">
    </div>
    <div class="form-row">
      <label>Points clés AS / Surveillance</label>
      <textarea id="newSurv" placeholder="Drains, biologie, pansements, stomie..."></textarea>
    </div>
    <div class="form-actions">
      <button class="btn-save" onclick="saveProtocol()">Enregistrer</button>
      <button class="btn-cancel" onclick="toggleAddForm()">Annuler</button>
    </div>
  </div>

  <div class="grid" id="cardsGrid"></div>
</div>

<div class="modal-bg" id="modalBg" onclick="closeModal(event)">
  <div class="modal" id="modal">
    <div class="modal-header">
      <h2 id="modalTitle"></h2>
      <button class="modal-close" onclick="closeModalDirect()">✕</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

let customProtocols = JSON.parse(localStorage.getItem('customProtocols') || '[]');
let currentTab = 'tous';

function getAllProtocols() {
  return [...PROTOCOLS, ...customProtocols];
}

function renderCards() {
  const search = document.getElementById('searchInput').value.toLowerCase();
  const grid = document.getElementById('cardsGrid');
  const all = getAllProtocols();
  const filtered = all.filter(p => {
    const matchTab = currentTab === 'tous' || p.cat === currentTab;
    const matchSearch = p.name.toLowerCase().includes(search) || p.summary.toLowerCase().includes(search);
    return matchTab && matchSearch;
  });

  if (filtered.length === 0) {
    grid.innerHTML = `<div class="empty" style="grid-column:1/-1"><div class="empty-icon">🔍</div><p>Aucun protocole trouvé</p></div>`;
    return;
  }

  grid.innerHTML = filtered.map(p => {
    const tagClass = { digestive: 'tag-digestive', bariatrique: 'tag-bariatrique', pansement: 'tag-pansement', autre: 'tag-autre' }[p.cat] || 'tag-autre';
    const tagLabel = { digestive: 'Chirurgie digestive', bariatrique: 'Bariatrique', pansement: 'Pansements', autre: 'Autre' }[p.cat] || 'Autre';
    const isCustom = p.id > 1000;
    return `<div class="card" onclick="openModal(${p.id})">
      <div class="card-tag ${tagClass}">${tagLabel}${isCustom ? ' · Personnalisé' : ''}</div>
      <h3>${p.name}</h3>
      <p>${p.summary}</p>
      <span class="card-arrow">›</span>
    </div>`;
  }).join('');
}

function filterTab(tab, el) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  renderCards();
}

function filterCards() { renderCards(); }

function openModal(id) {
  const all = getAllProtocols();
  const p = all.find(x => x.id === id);
  if (!p) return;
  document.getElementById('modalTitle').textContent = p.name;
  
  const realimLines = p.realim !== 'N/A' ? p.realim.split('\n').map(l => {
    const match = l.match(/^(J[-\d+]+):(.*)/);
    if (match) return `<div><span class="jour">${match[1]}</span>${match[2]}</div>`;
    return `<div>${l}</div>`;
  }).join('') : '<div style="color:#7a7268">Non applicable</div>';

  const preopHtml = p.preop !== 'N/A' ? p.preop.split('\n').map(l => `<div>${l}</div>`).join('') : '<div style="color:#7a7268">Non applicable</div>';
  const survHtml = p.surv.split('\n').map(l => `<div>${l}</div>`).join('');

  document.getElementById('modalBody').innerHTML = `
    <div class="section-block">
      <div class="section-block-header block-preop">🗓️ Pré-opératoire / Veille</div>
      <div class="section-block-body">${preopHtml}</div>
    </div>
    <div class="section-block">
      <div class="section-block-header block-realim">🍽️ Protocole de réalimentation</div>
      <div class="section-block-body">${realimLines}</div>
    </div>
    ${p.lever !== 'N/A' ? `<div class="section-block">
      <div class="section-block-header block-lever">🚶 1er lever / RAD</div>
      <div class="section-block-body">${p.lever}</div>
    </div>` : ''}
    <div class="section-block">
      <div class="section-block-header block-surv">👁️ Surveillance AS / Points clés</div>
      <div class="section-block-body">${survHtml}</div>
    </div>
    <p style="font-size:0.75rem;color:#7a7268;margin-top:1rem;text-align:center;">⚠️ Toujours se référer aux prescriptions médicales et consignes du chirurgien</p>
  `;
  document.getElementById('modalBg').classList.add('open');
}

function closeModal(e) {
  if (e.target === document.getElementById('modalBg')) closeModalDirect();
}
function closeModalDirect() {
  document.getElementById('modalBg').classList.remove('open');
}

function toggleAddForm() {
  document.getElementById('addForm').classList.toggle('open');
}

function saveProtocol() {
  const name = document.getElementById('newName').value.trim();
  if (!name) { alert('Le nom de la pathologie est obligatoire'); return; }
  const newP = {
    id: Date.now(),
    name,
    cat: document.getElementById('newCat').value,
    summary: document.getElementById('newSummary').value || 'Protocole personnalisé',
    preop: document.getElementById('newPreop').value || 'Voir protocole service',
    realim: document.getElementById('newRealim').value || 'Selon consignes du chir',
    lever: document.getElementById('newLever').value || 'Selon consignes du chir',
    surv: document.getElementById('newSurv').value || 'Voir protocole service'
  };
  customProtocols.push(newP);
  localStorage.setItem('customProtocols', JSON.stringify(customProtocols));
  ['newName','newSummary','newPreop','newRealim','newLever','newSurv'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('addForm').classList.remove('open');
  renderCards();
}

renderCards();
